<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Finanças</title>
    <link href="{{ url_for('static', path='/css/bootstrap.min.css') }}" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; height: 100vh; }
        .form-signup { max-width: 330px; padding: 15px; margin: auto; }
    </style>
</head>
<body>
    <main class="form-signup card shadow p-4">
        <form action="/register" method="post">
            <h1 class="h3 mb-3 fw-normal text-center">Criar Conta</h1>
            
            <div class="mb-2">
                <input type="text" name="username" class="form-control" placeholder="Seu Nome" required>
            </div>
            <div class="mb-2">
                <input type="email" name="email" class="form-control" placeholder="nome@exemplo.com" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Senha" required>
            </div>
            
            <button class="w-100 btn btn-lg btn-success" type="submit">Cadastrar</button>
            <p class="mt-3 text-muted text-center">Já tem conta? <a href="/login">Faça Login</a></p>
        </form>
    </main>
</body>
</html>
