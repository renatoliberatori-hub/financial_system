<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Finanças</title>
    <link href="{{ url_for('static', path='/css/bootstrap.min.css') }}" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; padding-top: 40px; padding-bottom: 40px; height: 100vh; }
        .form-signin { max-width: 330px; padding: 15px; margin: auto; }
    </style>
</head>
<body class="text-center">
    <main class="form-signin card shadow p-4">
        <form action="/login" method="post">
            <h1 class="h3 mb-3 fw-normal">Entrar no Sistema</h1>
            <div class="form-floating mb-2">
                <input type="email" name="email" class="form-control" id="floatingInput" placeholder="nome@exemplo.com" required>
                <label for="floatingInput">E-mail</label>
            </div>
            <div class="form-floating mb-3">
                <input type="password" name="password" class="form-control" id="floatingPassword" placeholder="Senha" required>
                <label for="floatingPassword">Senha</label>
            </div>
            <button class="w-100 btn btn-lg btn-primary" type="submit">Entrar</button>
            <p class="mt-3 text-muted">Ainda não tem conta? <a href="/register">Cadastre-se</a></p>
        </form>
    </main>
</body>
</html>
